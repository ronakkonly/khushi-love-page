align-items:center;

}
.heart{

@keyframes float{

}
100%{

}
h1{
color:#ff4f8b;
margin-bottom:15px;
}
p{
color:#555;
line-height:1.8;
margin-bottom:25px;
}
h2{
color:#d63384;
margin-bottom:25px;
}
.buttons{
position:relative;
height:120px;
}
button{
padding:12px 25px;
font-size:18px;
border:none;
border-radius:30px;
cursor:pointer;
transition:.3s;
}
#yes{
background:#ff4f8b;
color:white;
margin-right:15px;
}
#yes:hover{
transform:scale(1.08);
}
#no{
background:#eee;

#message{

</style>
</head>
